spring.application.name=pedidos-service-test

spring.datasource.url=jdbc:h2:mem:pedidos_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Desativa context-path de produção nos testes
server.servlet.context-path=/

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT — segredo fixo para testes (não usar em produção)
jwt.secret=segredo-de-teste-com-trinta-e-dois-caracteres-ok
jwt.expiration-ms=3600000

# Actuator em testes
management.endpoints.web.exposure.include=health,info
