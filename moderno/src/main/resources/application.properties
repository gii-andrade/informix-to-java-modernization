spring.application.name=pedidos-service

# -------------------------------------------------------
# Datasource — PostgreSQL (banco migrado do legado Informix)
# Ajuste host/porta/credenciais conforme seu ambiente.
# -------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/pedidos_db
spring.datasource.username=pedidos_user
spring.datasource.password=pedidos_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões HikariCP (padrão do Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# -------------------------------------------------------
# JPA / Hibernate
# validate: verifica que o schema do banco bate com as
# entidades sem modificar nada. Seguro para produção.
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# -------------------------------------------------------
# Servidor HTTP
# -------------------------------------------------------
server.port=8080
server.servlet.context-path=/api/v1

# -------------------------------------------------------
# Tratamento de erros — respostas RFC 7807 (Problem Details)
# -------------------------------------------------------
server.error.include-message=always
server.error.include-binding-errors=always
spring.mvc.problemdetails.enabled=true

# -------------------------------------------------------
# Serialização JSON
# -------------------------------------------------------
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# -------------------------------------------------------
# JWT
# Substitua jwt.secret por um valor gerado (≥ 32 chars).
# Exemplo: openssl rand -base64 48
# -------------------------------------------------------
jwt.secret=substitua-por-segredo-de-producao-com-minimo-32-chars
jwt.expiration-ms=86400000

# -------------------------------------------------------
# Actuator — Observabilidade
# Expõe health e info publicamente; demais endpoints
# exigem autenticação e são acessíveis apenas em /actuator/*.
# -------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=pedidos-service
info.app.version=1.0.0
info.app.description=Sistema de Pedidos - modernizacao Informix-4GL para Spring Boot 3

# -------------------------------------------------------
# Logging estruturado
# -------------------------------------------------------
logging.level.root=INFO
logging.level.br.com.pedidos=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
